<!DOCTYPE html>
<html>
<head>
    <title>Daftar Tempat PKL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="header">
        <h1>Daftar Tempat PKL</h1>
    </div>

    <div class="container">
        <a href="/" class="back-button">Kembali ke Dashboard</a>

        <div class="card">
            <table>
                <tr>
                    <th>ID</th>
                    <th>Nama Tempat PKL</th>
                    <th>Lokasi</th>
                    <th>Jarak</th>
                    <th>Fasilitas</th>
                    <th>Reputasi</th>
                    <th>Aksi</th>
                </tr>

                {% for item in data %}
                <tr>
                    <td>{{ item[0] }}</td>
                    <td>{{ item[1] }}</td>
                    <td>{{ item[2] }}</td>
                    <td>{{ item[3] }}</td>
                    <td>{{ item[4] }}</td>
                    <td>{{ item[5] }}</td>
                    <td>
                        <a href="/edit_tempat_pkl/{{ item[0] }}" class="edit-btn">Edit</a>
                        <a href="/hapus_tempat_pkl/{{ item[0] }}" class="delete-btn" onclick="return confirm('Yakin ingin menghapus data ini?')">Hapus</a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>

</body>
</html>
